# API Configuration Example
# Copy this file to api_config.toml and fill in your values

[llm]
provider = "openai"
base_url = "https://vip.auto-code.net/v1"
api_key = "YOUR_API_KEY_HERE"
model = "gpt-5.5"
max_tokens = 350000
temperature = 0.7
timeout = 300

[image]
provider = "openai"
base_url = "https://vip.auto-code.net/v1"
api_key = "YOUR_API_KEY_HERE"
model = "dall-e-3"
