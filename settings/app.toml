[project]
name = "AutoDesignMaker"
version = "1.0.0"
description = "AI-powered game design and development automation tool"

[paths]
workspace = "workspace"
data = "knowledge/design_data"
design_data = "knowledge/design_data"
ucos = "ucos"
memory = "memory"

[unity]
project_path = ""
editor_path = ""

[ui]
theme = "clam"
font_family = "Microsoft YaHei UI"
font_size = 9
window_width = 1560
window_height = 940

[dev]
hot_reload = true
debug = true
log_level = "DEBUG"

[plugins]
manifest_path = "pipeline/_registry.json"
auto_discover = true

[export]
default_format = "markdown"
include_metadata = true

[manual_gates]
enable_manual_gates = true
gate_art_style = true
gate_program_architecture = false

[art_style_generation]
num_options = 5
image_width = 1024
image_height = 1024

